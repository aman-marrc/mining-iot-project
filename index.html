<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Mining Vehicle Tracker</title>

<script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
<link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />

<style>
body { margin: 0; padding: 0; }
#map { width: 100%; height: 100vh; }
</style>
</head>

<body>

<div id="map"></div>

<script>
mapboxgl.accessToken = 'YOUR_MAPBOX_TOKEN';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/streets-v11',
  center: [86.4, 23.8],
  zoom: 12
});

const marker = new mapboxgl.Marker().setLngLat([86.4, 23.8]).addTo(map);
const route = [];
async function update() {
  const res = await fetch("http://127.0.0.1:5000/data");
  const data = await res.json();

  if (data.length > 0) {
    const last = data[data.length - 1];

    marker.setLngLat([last.lon, last.lat]);
    if (last.alerts.length > 0) {
    new mapboxgl.Popup()
        .setLngLat([last.lon, last.lat])
        .setHTML("<b>Alert:</b><br>" + last.alerts.join(", "))
        .addTo(map);
}
route.push([last.lon, last.lat]);

if (map.getSource('route')) {
    map.getSource('route').setData({
        type: 'Feature',
        geometry: {
            type: 'LineString',
            coordinates: route
        }
    });
} else {
    map.addSource('route', {
        type: 'geojson',
        data: {
            type: 'Feature',
            geometry: {
                type: 'LineString',
                coordinates: route
            }
        }
    });

    map.addLayer({
        id: 'route',
        type: 'line',
        source: 'route',
        paint: {
            'line-color': '#007bff',
            'line-width': 4
        }
    });
}
    // Show alerts
    if (last.alerts.length > 0) {
    //   alert("ALERT: " + last.alerts.join(", "));
    }
  }
}

setInterval(update, 2000);
</script>

</body>
</html>
